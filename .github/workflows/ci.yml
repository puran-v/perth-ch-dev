# Author: samir
# Impact: Enforces build quality gate and handles Vercel deployments
# Reason: Prevents broken code from merging into main/dev and centralises
#         deployment through GitHub Actions instead of Vercel's GitHub integration

name: CI — Build & Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# ---------------------------------------------------------------------
# Job 1 — Quality Gate (runs on every PR and push)
# Must pass before merge is allowed or deployment starts
# ---------------------------------------------------------------------
jobs:
  quality-gate:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
        run: npx prisma generate

      - name: Run type check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-secret' }}
          AUTH_URL: "http://localhost:3000"
          AUTH_TRUST_HOST: "true"
          FRONTEND_URL: "http://localhost:3000"
        run: npm run typecheck

      - name: Run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-secret' }}
          AUTH_URL: "http://localhost:3000"
          AUTH_TRUST_HOST: "true"
          FRONTEND_URL: "http://localhost:3000"
        run: npm run build

  # -------------------------------------------------------------------
  # Job 2 — Deploy Preview (dev branch only, after quality gate passes)
  # -------------------------------------------------------------------
  deploy-preview:
    name: Deploy to Vercel (Preview)
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
        run: npx prisma generate

      - name: Pull Vercel environment (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"

      - name: Print deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.preview_url }}"

  # -------------------------------------------------------------------
  # Job 3 — Deploy Production (main branch only, after quality gate passes)
  # -------------------------------------------------------------------
  deploy-production:
    name: Deploy to Vercel (Production)
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
        run: npx prisma generate

      - name: Pull Vercel environment (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production_url=$url" >> "$GITHUB_OUTPUT"

      - name: Print deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.production_url }}"
